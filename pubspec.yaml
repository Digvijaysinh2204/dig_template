name: structure
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1
environment:
  sdk: ^3.10.8
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.9
  intl: ^0.20.2
  get: ^4.7.3
  get_storage: ^2.1.1
  flutter_local_notifications: ^21.0.0
  flutter_timezone: ^5.0.2
  http: ^1.6.0
  firebase_crashlytics: ^5.1.0
  firebase_analytics: ^12.2.0
  firebase_messaging: ^16.1.3
  firebase_core: ^4.6.0
  flutter_svg: ^2.2.4
  gap: ^3.0.1
  cached_network_image: ^3.4.1
  connectivity_plus: ^7.1.0
  image_picker: ^1.2.1
  image_cropper: ^12.2.0
  dlibphonenumber: ^1.1.60
  flutter_dotenv: ^6.0.0
  url_launcher: ^6.3.2
  path_provider: ^2.1.5
  encrypt: ^5.0.3
  device_info_plus: ^12.4.0
  toastification: ^3.0.3
  background_downloader: ^9.5.4
  package_info_plus: ^9.0.1
  pinput: ^6.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
flutter:
  assets:
    - .env
    - assets/
    - assets/fonts/inter/
  generate: true
  uses-material-design: true
  config:
    enable-swift-package-manager: true

  fonts:
    - family: Regular
      fonts:
        - asset: assets/fonts/inter/regular.ttf
    - family: Medium
      fonts:
        - asset: assets/fonts/inter/medium.ttf
    - family: SemiBold
      fonts:
        - asset: assets/fonts/inter/semi-bold.ttf
    - family: Bold
      fonts:
        - asset: assets/fonts/inter/bold.ttf
